name: Build

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC — weekly base-image refresh
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64, armv7]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on (${{ matrix.arch }})
        uses: home-assistant/builder@2024.08.2
        with:
          args: |
            --${{ matrix.arch }} \
            --target autossh \
            ${{ github.event_name != 'pull_request' && format('--docker-hub ghcr.io/{0}', github.repository_owner) || '--test' }}

  smoke:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build local amd64 image
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.23 \
            -t autossh:smoke \
            ./autossh
      - name: Run smoke test
        run: |
          cat > /tmp/options.json <<'EOF'
          {"hostname":"smoke.invalid","ssh_port":22,"username":"autossh",
           "remote_ip_address":"127.0.0.1","remote_port":8123,
           "remote_forwarding":["2222:127.0.0.1:22"],"other_ssh_options":"",
           "monitoring_port":0,"force_keygen":false,
           "skip_remote_host_checks":true}
          EOF
          docker run --rm \
            -e AUTOSSH_DRYRUN=1 \
            -v /tmp/options.json:/data/options.json:ro \
            --entrypoint /bin/bash \
            autossh:smoke \
            -c 'source /usr/lib/bashio/bashio.sh && \
                source /usr/lib/autossh/keygen.sh && \
                source /usr/lib/autossh/tunnel.sh && \
                autossh::keygen && \
                autossh::tunnel' \
            | tee smoke.log
          grep -q 'command="",restrict,port-forwarding' smoke.log
          grep -q 'autossh -M 0 -N' smoke.log
          grep -q -- '-R 2222:127.0.0.1:22' smoke.log
