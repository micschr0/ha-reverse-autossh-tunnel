---
name: Build

"on":
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  schedule:
    - cron: '0 5 * * 1'  # Monday 05:00 UTC — weekly base-image refresh
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v1.4.0). Empty publishes "latest" only.'
        required: false
        type: string
        default: ''

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: autossh

permissions:
  contents: read

jobs:
  init:
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      publish: ${{ steps.meta.outputs.publish }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build matrix
        id: matrix
        uses: >- # 2026.06.0
          home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

      - name: Set build metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Strip optional leading "v" so image tags stay numeric (1.4.0, not v1.4.0).
          strip_v() { printf '%s' "${1#v}"; }
          case "$EVENT_NAME" in
            release)
              echo "publish=true" >> "$GITHUB_OUTPUT"
              echo "version=$(strip_v "$RELEASE_TAG")" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "publish=true" >> "$GITHUB_OUTPUT"
              if [[ -n "$INPUT_VERSION" ]]; then
                echo "version=$(strip_v "$INPUT_VERSION")" >> "$GITHUB_OUTPUT"
              else
                echo "version=latest" >> "$GITHUB_OUTPUT"
              fi
              ;;
            schedule)
              echo "publish=true" >> "$GITHUB_OUTPUT"
              echo "version=latest" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "publish=false" >> "$GITHUB_OUTPUT"
              echo "version=dev" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Read base image
        id: base
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          BUILD_FROM=$(grep -E "^\s+${ARCH}:" autossh/build.yaml | sed 's/^[[:space:]]*[^:]*:[[:space:]]*//')
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"

      - name: Build add-on (${{ matrix.arch }})
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          version: ${{ needs.init.outputs.version }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: autossh
          build-args: BUILD_FROM=${{ steps.base.outputs.build_from }}
          cosign-base-verify: ${{ steps.base.outputs.build_from }}
          cosign-base-identity: 'https://github.com/home-assistant/docker-base/.*'
          push: ${{ needs.init.outputs.publish }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    if: needs.init.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: >- # 2026.06.0
          home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  verify-publish:
    # Fails loudly if the published version tag is missing from GHCR. Without this,
    # release-please can succeed while HA Supervisor cannot pull <repo>:<version>.
    name: Verify published image
    needs: [init, manifest]
    if: needs.init.outputs.publish == 'true' && needs.init.outputs.version != 'latest'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      - name: Check version tag is pullable on GHCR
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ needs.init.outputs.version }}
        run: |
          set -euo pipefail
          missing=0
          for arch in $(printf '%s' "$ARCHITECTURES" | jq -r '.[]'); do
            ref="ghcr.io/${OWNER}/${arch}-${IMAGE_NAME}:${VERSION}"
            echo "Checking $ref"
            if ! docker manifest inspect "$ref" > /dev/null; then
              echo "::error::Image tag missing on GHCR: $ref"
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            echo "::error::One or more per-arch images for ${VERSION} are not published." \
              "HA Supervisor will fail to pull this version."
            exit 1
          fi

  smoke:
    name: Smoke test
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' || github.event_name == 'release'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Read amd64 base image
        id: smoke_base
        run: |
          BUILD_FROM=$(grep -E "^\s+amd64:" autossh/build.yaml | sed 's/^[[:space:]]*[^:]*:[[:space:]]*//')
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"
      - name: Build local amd64 image
        run: |
          docker build \
            --build-arg BUILD_FROM=${{ steps.smoke_base.outputs.build_from }} \
            -t autossh:smoke \
            ./autossh
      - name: Run smoke test
        run: |
          cat > /tmp/options.json <<'EOF'
          {"hostname":"smoke.invalid","ssh_port":22,"username":"autossh",
           "remote_ip_address":"127.0.0.1","remote_port":8123,
           "other_ssh_options":"","monitoring_port":20000,"force_keygen":false,
           "skip_remote_host_checks":true}
          EOF
          docker run --rm \
            -e AUTOSSH_DRYRUN=1 \
            -v /tmp/options.json:/data/options.json:ro \
            --entrypoint /bin/bash \
            autossh:smoke \
            -c '
              bashio::config()       { jq -r --arg k "$1" ".[\$k] // empty" /data/options.json; }
              bashio::config.true()  { [[ "$(jq -r --arg k "$1" ".[\$k]" /data/options.json)" == "true" ]]; }
              bashio::config.has_value() {
                local v
                v=$(jq -r --arg k "$1" ".[\$k] // empty" /data/options.json)
                [[ -n "$v" && "$v" != "null" ]]
              }
              bashio::var.is_empty() { [[ -z "$1" ]]; }
              bashio::log.info()    { echo "[INFO] $*"; }
              bashio::log.warning() { echo "[WARN] $*"; }
              bashio::log.error()   { echo "[ERROR] $*" >&2; }
              bashio::log.fatal()   { echo "[FATAL] $*" >&2; }
              source /usr/lib/autossh/keygen.sh
              source /usr/lib/autossh/tunnel.sh
              autossh::keygen
              autossh::tunnel
            ' \
            | tee smoke.log
          grep -q 'permitlisten=' smoke.log
          grep -q 'autossh -M 20000 -N' smoke.log
          grep -q 'ExitOnForwardFailure=yes' smoke.log

  e2e:
    # Boots the container under real /init (s6-overlay) and asserts no
    # boot-time infrastructure failure. Catches AppArmor profile regressions,
    # broken file permissions, missing files, arch mismatches, and s6 service
    # definition errors — i.e. any class of bug that prevents the service
    # script from being executed at all.
    #
    # Does NOT assert that the autossh validate/keygen/tunnel chain succeeds:
    # bashio::config in CI cannot reach the Supervisor HTTP API and won't fall
    # back to /data/options.json, so the chain fails at validate by design.
    # Script-chain correctness is covered by the Smoke job (with bashio stubs).
    name: Container boot e2e
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' || github.event_name == 'release'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Read amd64 base image
        id: e2e_base
        run: |
          BUILD_FROM=$(grep -E "^\s+amd64:" autossh/build.yaml | sed 's/^[[:space:]]*[^:]*:[[:space:]]*//')
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"
      - name: Build local amd64 image
        run: |
          docker build \
            --build-arg BUILD_FROM=${{ steps.e2e_base.outputs.build_from }} \
            -t autossh:e2e \
            ./autossh
      - name: Boot container under /init and capture log
        run: |
          docker run -d --name e2e autossh:e2e
          sleep 5
          docker logs e2e > /tmp/e2e.log 2>&1
          docker rm -f e2e >/dev/null
          echo '--- boot log ---'
          cat /tmp/e2e.log
          echo '--- end ---'
      - name: Assert no boot-time infrastructure failure
        run: |
          set -euo pipefail
          if grep -qE 'Permission denied|s6-overlay-suexec: fatal|exec format error' /tmp/e2e.log; then
            echo "::error::container boot produced a fatal / permission-denied error"
            exit 1
          fi
          # Sanity: at least one s6 service must have been started (proves
          # /init reached stage 2 — guards against silently-empty logs).
          if ! grep -q 's6-rc:.*successfully started' /tmp/e2e.log; then
            echo "::error::s6 did not successfully start any service — boot did not reach stage 2"
            exit 1
          fi

  scan:
    name: Container CVE scan
    needs: init
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Read amd64 base image
        id: scan_base
        run: |
          BUILD_FROM=$(grep -E "^\s+amd64:" autossh/build.yaml | sed 's/^[[:space:]]*[^:]*:[[:space:]]*//')
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"
      - name: Build local amd64 image
        run: |
          docker build \
            --build-arg BUILD_FROM=${{ steps.scan_base.outputs.build_from }} \
            -t autossh:scan \
            ./autossh
      - name: Scan image with Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          image: autossh:scan
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
      - name: Upload SARIF to GitHub Security
        if: always() && steps.grype.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype

  sbom:
    name: Generate SBOM
    needs: [init, manifest]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Read amd64 base image
        id: sbom_base
        run: |
          BUILD_FROM=$(grep -E "^\s+amd64:" autossh/build.yaml | sed 's/^[[:space:]]*[^:]*:[[:space:]]*//')
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"
      - name: Build local amd64 image
        run: |
          docker build \
            --build-arg BUILD_FROM=${{ steps.sbom_base.outputs.build_from }} \
            -t autossh:sbom \
            ./autossh
      - name: Generate CycloneDX SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: autossh:sbom
          format: cyclonedx-json
          artifact-name: autossh-${{ needs.init.outputs.version }}-sbom.cdx.json
          upload-release-assets: true
