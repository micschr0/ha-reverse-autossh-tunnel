name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: autossh/Dockerfile

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -x \
            autossh/rootfs/etc/services.d/autossh/run \
            autossh/rootfs/etc/services.d/autossh/finish \
            autossh/rootfs/usr/lib/autossh/*.sh

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: yamllint repository.yaml autossh/config.yaml autossh/build.yaml .github/workflows/

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install BATS and jq
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run BATS tests
        run: bats tests/

  addon-config:
    name: HA add-on config schema
    # Validates autossh/config.yaml and autossh/build.yaml against the official
    # Home Assistant add-on JSON Schemas. Catches type errors that the Supervisor
    # rejects at runtime (e.g. `privileged: false` instead of a capability list).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./autossh

  zizmor:
    name: GitHub Actions security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          min-severity: medium
          min-confidence: medium
