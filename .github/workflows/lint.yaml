name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: autossh/Dockerfile

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -x \
            autossh/rootfs/etc/services.d/autossh/run \
            autossh/rootfs/etc/services.d/autossh/finish \
            autossh/rootfs/usr/lib/autossh/*.sh

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: yamllint repository.yaml autossh/config.yaml autossh/build.yaml .github/workflows/

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS and jq
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run BATS tests
        run: bats tests/
