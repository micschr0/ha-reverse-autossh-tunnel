name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: autossh/Dockerfile

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -x \
            autossh/rootfs/etc/services.d/autossh/run \
            autossh/rootfs/etc/services.d/autossh/finish \
            autossh/rootfs/usr/lib/autossh/*.sh

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: yamllint repository.yaml autossh/config.yaml autossh/build.yaml .github/workflows/

  json-lint:
    name: JSON lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate all JSON files are parseable
        run: |
          shopt -s globstar
          cat **/*.json | jq '.'

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install BATS and jq
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run BATS tests
        run: bats tests/

  addon-config:
    name: HA add-on config schema
    # Validates autossh/config.yaml against the official HA add-on JSON Schema
    # (vendored from frenck/action-addon-linter). Catches schema violations the
    # Supervisor rejects at runtime, e.g. `privileged: false` instead of a list.
    # build.yaml is intentionally not validated here — its digest-pin syntax
    # (`tag@sha256:...`) is not covered by the vendored schema, and
    # home-assistant/builder validates it during the Build job anyway.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
      - name: Install validator dependencies
        run: pip install jsonschema PyYAML
      - name: Validate autossh/config.yaml
        run: python3 tests/test_addon_config.py

  zizmor:
    name: GitHub Actions security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          min-severity: medium
          min-confidence: medium
