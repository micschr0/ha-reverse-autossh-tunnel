name: Renovate

on:
  schedule:
    - cron: '0 4 * * *'  # daily 04:00 UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        required: false
        default: info
        type: choice
        options:
          - info
          - debug
  push:
    branches: [main]
    paths:
      - renovate.json
      - .github/workflows/renovate.yml

permissions: {}

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: '["micschr0/ha-reverse-autossh-tunnel"]'
