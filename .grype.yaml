---
# Go stdlib + golang.org/x/crypto CVEs from base image binaries (S6 overlay, etc.).
# These CANNOT be fixed by apk upgrade — requires upstream base image rebuild.
# All system-package CVEs (OpenSSL, curl, bind) are handled by apk upgrade in Dockerfile.
ignore:
  - vulnerability: CVE-2025-68121     # critical: stdlib
  - vulnerability: CVE-2025-22871     # critical: stdlib
  - vulnerability: CVE-2026-27143     # critical: stdlib
  - vulnerability: GHSA-v778-237x-gjrc  # critical: golang.org/x/crypto
  - vulnerability: GO-2025-3563       # critical: stdlib
  - vulnerability: GO-2026-4337       # critical: stdlib
  - vulnerability: GHSA-hcg3-q754-cr77  # high: golang.org/x/crypto
  - vulnerability: CVE-2026-6276      # high: curl (Alpine 8.19.0, no patch yet)
  - vulnerability: CVE-2026-5773      # high: curl (Alpine 8.19.0, no patch yet)
