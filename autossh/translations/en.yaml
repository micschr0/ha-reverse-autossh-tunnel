configuration:
  hostname:
    name: Remote SSH server
    description: >-
      DNS name or IP address of the remote SSH server. Must be reachable from
      this add-on (outbound TCP on the configured SSH port).
  ssh_port:
    name: SSH port
    description: >-
      Port the remote SSH server listens on. Default is 22.
  username:
    name: SSH username
    description: >-
      User account on the remote SSH server. The public key generated by this
      add-on must be added to that account's authorized_keys file.
  remote_ip_address:
    name: Remote bind address
    description: >-
      Interface on the remote server to bind the forwarded port. Use 127.0.0.1
      (default) to keep the port local-only — place a reverse proxy such as
      nginx or Caddy in front for public access. Use 0.0.0.0 to expose the port
      directly on all interfaces (requires GatewayPorts clientspecified in
      sshd_config).
  remote_port:
    name: Remote port
    description: >-
      Port number opened on the remote server. Incoming traffic on this port is
      forwarded through the tunnel to Home Assistant.
  local_ip_address:
    name: Local HA address
    description: >-
      Home Assistant address as seen from inside this container. The default
      "homeassistant" resolves correctly on the Supervisor internal network.
      Only change this if you are running the add-on without the Supervisor.
  local_port:
    name: Local HA port
    description: >-
      Home Assistant port to forward to. Defaults to the same value as
      Remote port. Set to 8123 if your Home Assistant instance uses the
      standard port.
  other_ssh_options:
    name: Extra SSH options
    description: >-
      Additional flags passed verbatim to the SSH command. Use -v to enable
      verbose debug output. Note: ProxyCommand and LocalCommand are blocked
      for security and will be rejected.
  monitoring_port:
    name: Monitoring port
    description: >-
      TCP port autossh uses for its internal echo health-check loop. When
      non-zero, autossh restarts the tunnel if the echo loop stops responding.
      Set to 0 to disable and rely on SSH keepalives only. The default of
      20000 is recommended for most setups.
  force_keygen:
    name: Force key regeneration
    description: >-
      Generate a new ED25519 keypair on the next add-on start. This flag resets
      to false automatically after the new key is created. You must add the new
      public key to the remote server's authorized_keys before the tunnel can
      reconnect.
  skip_remote_host_checks:
    name: Skip remote host checks
    description: >-
      Skip SSH host key pinning via ssh-keyscan. Disabling this check makes
      the first connection vulnerable to man-in-the-middle attacks. Use only
      for debugging or on fully trusted, isolated networks.
